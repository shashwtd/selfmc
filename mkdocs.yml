site_name: Minecraft Server on DigitalOcean
site_description: Self-hosted Minecraft with automated backups, hibernate/revive, and Discord notifications
site_url: https://shashwtd.github.io/selfmc/
repo_url: https://github.com/shashwtd/selfmc
repo_name: shashwtd/selfmc

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: green
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Setting it up: setup.md
  - Hibernate & Revive: HIBERNATE.md
  - Operations: OPERATIONS.md
  - Recovery: RECOVERY.md
  - Reference: REFERENCE.md
  - Discord: WEBHOOKS.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
